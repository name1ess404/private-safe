<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoNotes - E2EE</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="auth-container">
        <h1>CryptoNotes</h1>
        <p>Anonymous End-to-End Encrypted Notes</p>
        
        <div class="auth-form">
            <input type="text" id="username" placeholder="Username" autocomplete="username">
            <input type="password" id="password" placeholder="Password" autocomplete="current-password">
            
            <div class="persistence-options">
                <label>
                    <input type="checkbox" id="remember-me"> Remember Me
                </label>
                <select id="duration">
                    <option value="session">Until Refresh</option>
                    <option value="1">1 Hour</option>
                    <option value="24">24 Hours</option>
                    <option value="forever">Forever</option>
                </select>
            </div>

            <div class="btn-group">
                <button type="button" onclick="handleAuth('signup')">Sign Up</button>
                <button type="button" onclick="handleAuth('login')">Log In</button>
            </div>
        </div>
    </div>

    <div id="app-container" style="display: none;">
        <header>
            <strong id="user-display"></strong>
            <button onclick="logout()" class="btn-secondary">Logout</button>
        </header>
        
        <section id="note-editor">
            <h3>Create New Note</h3>
            <input type="text" id="note-title" placeholder="Note Title">
            <textarea id="note-content" rows="5" placeholder="Write your encrypted note..."></textarea>
            <button onclick="saveNote()">Save Encrypted Note</button>
        </section>

        <hr>
        <h2>Your Private Notes</h2>
        <div id="notes-list"></div>
    </div>

    <script src="app.js" defer></script>
</body>
</html>
